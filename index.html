<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devstar Games | Official Ecosystem</title>
    <style>
        :root {
            --bg: #050810;
            --grid: rgba(56, 189, 248, 0.05);
            --accent: #00d2ff;
            --card-bg: #111827;
            --glass: rgba(17, 24, 39, 0.9);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: #e5e7eb;
            font-family: 'Inter', system-ui, sans-serif;
            user-select: none;
        }

        /* Sahne */
        #viewport {
            width: 100vw; height: 100vh;
            cursor: grab;
            overflow: hidden;
            position: relative;
        }

        #viewport:active { cursor: grabbing; }

        #canvas {
            position: absolute;
            width: 12000px; height: 12000px;
            background-image: 
                radial-gradient(var(--accent) 1px, transparent 1px),
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 100px 100px, 40px 40px, 40px 40px;
            transform-origin: 0 0;
            will-change: transform;
        }

        /* Kartlar */
        .card {
            position: absolute;
            width: 240px;
            background: var(--card-bg);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            z-index: 10;
            transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.3);
        }

        .card h3 { 
            margin: 0; font-size: 17px; color: var(--accent); 
            text-transform: uppercase; letter-spacing: 1px;
        }
        
        .card-desc {
            font-size: 14px; margin-top: 12px;
            display: none; border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px; color: #9ca3af; line-height: 1.5;
        }

        .card.open .card-desc { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-btn {
            display: inline-block; margin-top: 12px;
            background: linear-gradient(135deg, var(--accent), #3a7bd5);
            color: #000; padding: 8px 15px; border-radius: 8px;
            text-decoration: none; font-size: 12px; font-weight: bold;
            transition: 0.3s;
        }

        /* Bağlantılar */
        svg {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }

        line { 
            stroke: var(--accent); stroke-width: 2; opacity: 0.3; 
            stroke-dasharray: 5; animation: flow 30s linear infinite; 
        }

        @keyframes flow { to { stroke-dashoffset: -100; } }

        /* Arayüz */
        #header {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: var(--glass); padding: 15px 25px; border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
        }

        #focus-btn {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--accent); color: #000;
            border: none; padding: 12px 25px; border-radius: 30px;
            font-weight: bold; cursor: pointer; z-index: 1000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div id="header">
    <h1 style="margin:0; font-size: 18px; color: var(--accent);">DEVSTAR GAMES <span style="color:#fff; opacity:0.5;">| ECOSYSTEM</span></h1>
</div>

<button id="focus-btn" onclick="focusCenter()">MERKEZE DÖN</button>

<div id="viewport">
    <div id="canvas">
        <svg id="connections"></svg>
        </div>
</div>

<script>
    const viewport = document.getElementById('viewport');
    const canvas = document.getElementById('canvas');
    const svg = document.getElementById('connections');
    
    // TÜM VERİLERİN (KİLİTLİ)

ue},{"id":1776526829635,"title":"Çağrı ","desc":"Senaristtt","url":"","x":5448,"y":5167.5,"isOpen":true},{"id":1776526846829,"title":"Hayrettin","desc":"Arrrrrrrrtist","url":"","x":5818,"y":5162.5,"isOpen":true},{"id":1776527610251,"title":"İsmail ","desc":"Logocu","url":"","x":5443,"y":5325.5,"isOpen":false},{"id":1776527650271,"title":"Kılıç Oyun","desc":"Partner Stüdyo","url":"","x":5816,"y":5328.5,"isOpen":false},{"id":1776527720087,"title":"Sponsor&Destekçiler","desc":"Ekosistemi destekleyenler","url":"","x":6199,"y":5332.5,"isOpen":false},{"id":1776527734648,"title":"Yakup","desc":"Destekçi","url":"","x":5814,"y":5427.5,"isOpen":false}];
    
    const conns = [{"from":1776525705060,"to":1776525780348},{"from":1776525705060,"to":1776525811271},{"from":1776525780348,"to":1776525864781},{"from":1776525864781,"to":1776525895633},{"from":1776525864781,"to":1776525928701},{"from":1776525864781,"to":1776525959688},{"from":1776525811271,"to":1776526316113},{"from":1776526554020,"to":1776525864781},{"from":1776525864781,"to":1776526598497},{"from":1776526669297,"to":1776525864781},{"from":1776525705060,"to":1776526737017},{"from":1776526737017,"to":1776526798336},{"from":1776526737017,"to":1776526816617},{"from":1776526737017,"to":1776526829635},{"from":1776526737017,"to":1776526846829},{"from":1776527610251,"to":1776526737017},{"from":1776527650271,"to":1776526737017},{"from":1776527720087,"to":1776527650271},{"from":1776527720087,"to":1776526737017},{"from":1776527720087,"to":1776527734648}];

    let camX = -4800, camY = -4100;
    let isPanning = false;
    let startMouseX, startMouseY;

    function init() {
        updateCam();
        render();
        window.addEventListener('contextmenu', e => e.preventDefault());
    }

    // Kamera Sürükleme
    viewport.addEventListener('mousedown', (e) => {
        if (e.target.closest('.card-btn')) return;
        isPanning = true;
        startMouseX = e.clientX - camX;
        startMouseY = e.clientY - camY;
    });

    window.addEventListener('mousemove', (e) => {
        if (isPanning) {
            camX = e.clientX - startMouseX;
            camY = e.clientY - startMouseY;
            updateCam();
        }
    });

    window.addEventListener('mouseup', () => isPanning = false);

    function updateCam() {
        canvas.style.transform = `translate(${camX}px, ${camY}px)`;
    }

    function focusCenter() {
        camX = -4850; camY = -4100; updateCam();
    }

    function render() {
        canvas.querySelectorAll('.card').forEach(c => c.remove());
        
        cards.forEach(card => {
            const div = document.createElement('div');
            div.className = `card ${card.isOpen ? 'open' : ''}`;
            div.style.left = card.x + 'px';
            div.style.top = card.y + 'px';
            
            let btn = card.url ? `<a href="${card.url}" target="_blank" class="card-btn">ZİYARET ET</a>` : '';
            div.innerHTML = `<h3>${card.title}</h3><div class="card-desc">${card.desc}<br>${btn}</div>`;

            div.onclick = (e) => {
                if(e.target.classList.contains('card-btn')) return;
                card.isOpen = !card.isOpen;
                div.classList.toggle('open');
            };

            canvas.appendChild(div);
        });

        drawLines();
    }

    function drawLines() {
        svg.innerHTML = '';
        conns.forEach(conn => {
            const c1 = cards.find(c => c.id === conn.from);
            const c2 = cards.find(c => c.id === conn.to);
            if(c1 && c2) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", c1.x + 120); line.setAttribute("y1", c1.y + 40);
                line.setAttribute("x2", c2.x + 120); line.setAttribute("y2", c2.y + 40);
                svg.appendChild(line);
            }
        });
    }

    init();
</script>
</body>
</html>
